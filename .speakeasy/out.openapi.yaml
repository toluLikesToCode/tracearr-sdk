        user:
          type: "object"
          properties:
            id:
              type: "string"
              format: "uuid"
            username:
              type: "string"
              example: "john_doe"
            thumbUrl:
              type: "string"
              nullable: true
              description: "Avatar path from media server"
            avatarUrl:
              type: "string"
              nullable: true
              description: "Proxied avatar URL"
          required:
            - "id"
            - "username"
            - "thumbUrl"
            - "avatarUrl"
      required:
        - "id"
