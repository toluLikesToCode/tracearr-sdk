          example: "hevc"
        sourceAudioCodec:
          type: "string"
          nullable: true
          example: "truehd"
        sourceAudioChannels:
          type: "integer"
          nullable: true
          example: 8
        sourceVideoWidth:
          type: "integer"
          nullable: true
          example: 3840
        sourceVideoHeight:
          type: "integer"
          nullable: true
          example: 2160
        sourceVideoDetails:
          $ref: "#/components/schemas/SourceVideoDetails"
        sourceAudioDetails:
          $ref: "#/components/schemas/SourceAudioDetails"
        streamVideoCodec:
          type: "string"
          nullable: true
          example: "h264"
        streamAudioCodec:
          type: "string"
          nullable: true
          example: "aac"
        streamVideoDetails:
          $ref: "#/components/schemas/StreamVideoDetails"
        streamAudioDetails:
          $ref: "#/components/schemas/StreamAudioDetails"
        transcodeInfo:
          $ref: "#/components/schemas/TranscodeInfo"
        subtitleInfo:
          $ref: "#/components/schemas/SubtitleInfo"
        resolution:
          type: "string"
          nullable: true
          description: "4K, 1080p, 720p, etc."
          example: "4K"
        sourceVideoCodecDisplay:
          type: "string"
          nullable: true
          example: "HEVC"
        sourceAudioCodecDisplay:
          type: "string"
          nullable: true
          example: "TrueHD"
        audioChannelsDisplay:
          type: "string"
          nullable: true
          example: "7.1"
        streamVideoCodecDisplay:
